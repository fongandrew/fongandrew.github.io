<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>说 · Chinese Pronunciation Practice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1a1a;
    --paper: #f5f0e8;
    --paper-deep: #ebe4d8;
    --vermillion: #c73e1d;
    --vermillion-light: #e8563a;
    --vermillion-glow: rgba(199, 62, 29, 0.12);
    --jade: #2d6a4f;
    --jade-light: #40916c;
    --gold: #b5930a;
    --gold-light: #d4a90e;
    --mist: rgba(26, 26, 26, 0.06);
    --shadow-sm: 0 1px 3px rgba(26, 26, 26, 0.08);
    --shadow-md: 0 4px 16px rgba(26, 26, 26, 0.1);
    --shadow-lg: 0 8px 32px rgba(26, 26, 26, 0.12);
    --radius: 8px;
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { font-size: 16px; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(199, 62, 29, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(45, 106, 79, 0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(245, 240, 232, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--mist);
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
  }

  .logo-char {
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 900;
    font-size: 1.75rem;
    color: var(--vermillion);
    line-height: 1;
  }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--ink);
    opacity: 0.5;
    letter-spacing: 0.02em;
  }

  .mode-toggle {
    display: flex;
    background: var(--paper-deep);
    border-radius: 100px;
    padding: 3px;
    gap: 2px;
    border: 1px solid var(--mist);
  }

  .mode-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 0.4rem 1rem;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    background: transparent;
    color: var(--ink);
    opacity: 0.5;
    transition: var(--transition);
    letter-spacing: 0.02em;
  }

  .mode-btn.active {
    background: white;
    opacity: 1;
    box-shadow: var(--shadow-sm);
  }

  .mode-btn:hover:not(.active) {
    opacity: 0.75;
  }

  /* ── Voice selector ── */
  .voice-bar {
    padding: 0.5rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    border-bottom: 1px solid var(--mist);
    background: rgba(245, 240, 232, 0.5);
    position: relative;
    z-index: 50;
    flex-wrap: wrap;
  }

  .voice-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex: 1;
    min-width: 0;
  }

  .voice-bar label {
    font-size: 0.75rem;
    font-weight: 500;
    opacity: 0.5;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .voice-bar select {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 0.35rem 0.6rem;
    border: 1px solid var(--mist);
    border-radius: var(--radius);
    background: white;
    color: var(--ink);
    flex: 1;
    min-width: 0;
    max-width: 360px;
    cursor: pointer;
    outline: none;
    transition: var(--transition);
  }

  .voice-bar select:focus {
    border-color: var(--vermillion);
  }

  .voice-warning {
    font-size: 0.72rem;
    color: var(--vermillion);
    opacity: 0.8;
    display: none;
    align-items: center;
    gap: 0.3rem;
  }

  .voice-warning.show { display: flex; }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-left: auto;
    flex-shrink: 0;
  }

  .speed-control label {
    font-size: 0.72rem;
    font-weight: 500;
    opacity: 0.5;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .speed-control input[type="range"] {
    width: 80px;
    accent-color: var(--vermillion);
    cursor: pointer;
  }

  .speed-val {
    font-size: 0.75rem;
    font-weight: 500;
    min-width: 2.5em;
    text-align: center;
    color: var(--vermillion);
  }

  /* ── Bundle bar ── */
  .bundle-bar {
    padding: 0.5rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    border-bottom: 1px solid var(--mist);
    background: rgba(245, 240, 232, 0.5);
    position: relative;
    z-index: 40;
    flex-wrap: wrap;
  }

  .bundle-bar label {
    font-size: 0.75rem;
    font-weight: 500;
    opacity: 0.5;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .bundle-bar select {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 0.35rem 0.6rem;
    border: 1px solid var(--mist);
    border-radius: var(--radius);
    background: white;
    color: var(--ink);
    flex: 1;
    min-width: 0;
    max-width: 240px;
    cursor: pointer;
    outline: none;
    transition: var(--transition);
  }

  .bundle-bar select:focus {
    border-color: var(--vermillion);
  }

  .bundle-actions {
    display: flex;
    gap: 0.25rem;
    align-items: center;
  }

  .bundle-actions-io {
    display: flex;
    gap: 0.25rem;
    align-items: center;
    margin-left: auto;
  }

  .btn-icon {
    font-family: 'DM Sans', sans-serif;
    width: 32px;
    height: 32px;
    border: 1px solid var(--mist);
    border-radius: 6px;
    cursor: pointer;
    background: white;
    color: var(--ink);
    opacity: 0.5;
    transition: var(--transition);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    flex-shrink: 0;
  }

  .btn-icon:hover {
    opacity: 1;
    border-color: var(--ink);
  }

  .btn-icon svg {
    width: 14px;
    height: 14px;
  }

  .btn-icon.danger:hover {
    color: var(--vermillion);
    border-color: var(--vermillion);
  }

  /* ── Main ── */
  main {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  /* ── Edit Mode ── */
  .edit-view {
    display: none;
    flex-direction: column;
    gap: 1rem;
    animation: fadeUp 0.35s ease;
  }

  .edit-view.active { display: flex; }

  .edit-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .edit-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 400;
  }

  .edit-hint {
    font-size: 0.75rem;
    opacity: 0.45;
    line-height: 1.4;
  }

  .textarea-wrap {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-md);
  }

  .textarea-wrap::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--vermillion), var(--gold), var(--jade));
    z-index: 2;
  }

  textarea {
    width: 100%;
    min-height: 320px;
    padding: 1.25rem;
    font-family: 'Noto Sans SC', 'DM Sans', sans-serif;
    font-size: 1.1rem;
    line-height: 2;
    border: 1px solid var(--mist);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    background: white;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: var(--transition);
  }

  textarea:focus {
    border-color: rgba(199, 62, 29, 0.3);
    box-shadow: 0 0 0 3px var(--vermillion-glow);
  }

  textarea::placeholder {
    color: var(--ink);
    opacity: 0.25;
    font-size: 0.95rem;
  }

  .edit-actions {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn-primary {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.85rem;
    letter-spacing: 0.03em;
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    background: var(--vermillion);
    color: white;
    transition: var(--transition);
    box-shadow: var(--shadow-sm);
    min-height: 44px;
  }

  .btn-primary:hover {
    background: var(--vermillion-light);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.8rem;
    padding: 0.6rem 1.2rem;
    border: 1px solid var(--mist);
    border-radius: 100px;
    cursor: pointer;
    background: white;
    color: var(--ink);
    opacity: 0.7;
    transition: var(--transition);
    min-height: 44px;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
  }

  .btn-secondary:hover {
    opacity: 1;
    border-color: var(--ink);
  }

  .phrase-count {
    font-size: 0.75rem;
    opacity: 0.4;
    margin-left: auto;
  }

  /* ── Speak Mode ── */
  .speak-view {
    display: none;
    flex-direction: column;
    gap: 1.25rem;
    animation: fadeUp 0.35s ease;
  }

  .speak-view.active { display: flex; }

  .speak-empty {
    text-align: center;
    padding: 4rem 2rem;
    opacity: 0.4;
  }

  .speak-empty-char {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 3rem;
    display: block;
    margin-bottom: 0.75rem;
  }

  .speak-empty p {
    font-size: 0.85rem;
    line-height: 1.6;
  }

  /* ── Flash Mode ── */
  .flash-view {
    display: none;
    flex-direction: column;
    gap: 1.25rem;
    animation: fadeUp 0.35s ease;
  }

  .flash-view.active { display: flex; }

  .flash-progress {
    height: 4px;
    background: var(--mist);
    border-radius: 2px;
    overflow: hidden;
  }

  .flash-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--jade), var(--jade-light));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .flash-counter {
    text-align: center;
    font-size: 0.75rem;
    font-weight: 500;
    opacity: 0.45;
    letter-spacing: 0.04em;
  }

  .flash-card {
    background: white;
    border: 1px solid var(--mist);
    border-radius: var(--radius);
    padding: 3rem 2rem;
    min-height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    box-shadow: var(--shadow-md);
    transition: var(--transition);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
  }

  .flash-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--vermillion), var(--gold), var(--jade));
  }

  .flash-card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
  }

  .flash-card:active {
    transform: translateY(0) scale(0.98);
  }

  .flash-card.speaking {
    border-color: var(--vermillion);
    box-shadow: 0 0 0 3px var(--vermillion-glow), var(--shadow-md);
    animation: pulse 0.8s ease infinite;
  }

  .flash-hanzi {
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 700;
    font-size: 3.5rem;
    line-height: 1.3;
    color: var(--ink);
  }

  .flash-card.long-phrase .flash-hanzi {
    font-size: 2.2rem;
  }

  .flash-buttons {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
  }

  .btn-flash {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.85rem;
    letter-spacing: 0.03em;
    padding: 0.75rem 1.75rem;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    transition: var(--transition);
    box-shadow: var(--shadow-sm);
    min-height: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
  }

  .btn-flash:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }

  .btn-flash:active { transform: translateY(0); }

  .btn-flash svg {
    width: 18px;
    height: 18px;
  }

  .btn-flash-speak {
    background: var(--gold);
    color: white;
  }
  .btn-flash-speak:hover { background: var(--gold-light); }

  .btn-flash-wrong {
    background: var(--vermillion);
    color: white;
  }
  .btn-flash-wrong:hover { background: var(--vermillion-light); }

  .btn-flash-correct {
    background: var(--jade);
    color: white;
  }
  .btn-flash-correct:hover { background: var(--jade-light); }

  .flash-card.slide-out {
    animation: cardSlideOut 0.2s ease forwards;
  }

  .flash-card.slide-in {
    animation: cardSlideIn 0.25s ease;
  }

  .flash-done {
    text-align: center;
    padding: 3rem 2rem;
    animation: fadeUp 0.4s ease;
  }

  .flash-done-icon {
    color: var(--jade);
    margin-bottom: 1rem;
  }

  .flash-done-icon svg {
    width: 64px;
    height: 64px;
  }

  .flash-done-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 400;
    margin-bottom: 1rem;
  }

  .flash-done-stats {
    font-size: 0.85rem;
    opacity: 0.6;
    line-height: 1.8;
    margin-bottom: 1.5rem;
  }

  .flash-done-actions {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* Grid */
  .phrase-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 0.75rem;
  }

  .phrase-card {
    position: relative;
    background: white;
    border: 1px solid var(--mist);
    border-radius: var(--radius);
    padding: 1.1rem 0.5rem;
    min-height: 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .phrase-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2.5px;
    background: var(--vermillion);
    transform: scaleX(0);
    transition: transform 0.3s ease;
  }

  .phrase-card:hover {
    border-color: rgba(199, 62, 29, 0.25);
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }

  .phrase-card:hover::after {
    transform: scaleX(1);
  }

  .phrase-card:active {
    transform: translateY(0) scale(0.97);
  }

  .phrase-card.speaking {
    border-color: var(--vermillion);
    box-shadow: 0 0 0 3px var(--vermillion-glow), var(--shadow-md);
    animation: pulse 0.8s ease infinite;
  }

  .phrase-card.speaking::after {
    transform: scaleX(1);
    background: linear-gradient(90deg, var(--vermillion), var(--gold));
  }

  .phrase-hanzi {
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 700;
    font-size: 1.6rem;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 0.15rem;
  }

  .phrase-card.long .phrase-hanzi {
    font-size: 1.2rem;
  }

  .phrase-index {
    font-size: 0.6rem;
    font-weight: 500;
    opacity: 0.2;
    position: absolute;
    top: 0.35rem;
    right: 0.5rem;
  }

  /* Sound wave icon overlay */
  .sound-icon {
    position: absolute;
    top: 0.35rem;
    left: 0.5rem;
    opacity: 0;
    transition: var(--transition);
    color: var(--vermillion);
  }

  .phrase-card:hover .sound-icon,
  .phrase-card.speaking .sound-icon {
    opacity: 0.5;
  }

  .phrase-card.speaking .sound-icon {
    opacity: 1;
    animation: soundPulse 0.6s ease infinite alternate;
  }

  /* Shuffle / All controls */
  .speak-controls {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .speak-controls .btn-secondary svg {
    width: 14px;
    height: 14px;
    vertical-align: -2px;
    margin-right: 4px;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px var(--vermillion-glow), var(--shadow-md); }
    50% { box-shadow: 0 0 0 6px var(--vermillion-glow), var(--shadow-lg); }
  }

  @keyframes soundPulse {
    from { transform: scale(1); }
    to { transform: scale(1.15); }
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes cardSlideOut {
    to { opacity: 0; transform: translateX(-40px) scale(0.95); }
  }

  @keyframes cardSlideIn {
    from { opacity: 0; transform: translateX(40px) scale(0.95); }
    to { opacity: 1; transform: translateX(0) scale(1); }
  }

  /* ── Responsive ── */

  /* Tablet */
  @media (max-width: 768px) {
    header { padding: 0.6rem 1rem; }
    .voice-bar { padding: 0.5rem 1rem; }
    main { padding: 1.25rem; }
    .phrase-grid {
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 0.6rem;
    }
  }

  /* Mobile */
  @media (max-width: 480px) {
    header {
      padding: 0.5rem 0.75rem;
    }

    .logo-char { font-size: 1.5rem; }
    .logo-text { font-size: 0.78rem; }

    .mode-btn {
      font-size: 0.78rem;
      padding: 0.45rem 0.9rem;
      min-height: 36px;
    }

    .voice-bar {
      padding: 0.6rem 0.75rem;
      gap: 0.5rem;
      flex-direction: column;
      align-items: stretch;
    }

    .voice-row {
      width: 100%;
    }

    .voice-bar select {
      max-width: none;
      font-size: 16px; /* prevents iOS zoom on focus */
      padding: 0.45rem 0.6rem;
    }

    .speed-control {
      margin-left: 0;
      width: 100%;
      justify-content: flex-start;
    }

    .speed-control input[type="range"] {
      flex: 1;
      max-width: 160px;
    }

    .voice-warning {
      font-size: 0.7rem;
    }

    main { padding: 0.75rem; }

    .edit-header {
      flex-direction: column;
      gap: 0.2rem;
      align-items: flex-start;
    }

    .edit-title { font-size: 1.2rem; }

    textarea {
      min-height: 240px;
      padding: 1rem;
      font-size: 1rem;
      line-height: 1.9;
    }

    textarea::placeholder { font-size: 0.85rem; }

    .edit-actions {
      flex-direction: column;
      align-items: stretch;
      gap: 0.5rem;
    }

    .btn-primary {
      width: 100%;
      text-align: center;
      justify-content: center;
      font-size: 0.9rem;
      padding: 0.85rem 1.5rem;
    }

    .btn-secondary {
      justify-content: center;
    }

    .edit-actions .btn-secondary {
      width: 100%;
      text-align: center;
    }

    .phrase-count {
      text-align: center;
      margin-left: 0;
    }

    .speak-controls {
      gap: 0.4rem;
    }

    .speak-controls .btn-secondary {
      flex: 1;
      min-width: 0;
      padding: 0.6rem 0.5rem;
      font-size: 0.75rem;
      justify-content: center;
    }

    .phrase-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }

    .phrase-card {
      padding: 0.9rem 0.35rem;
      min-height: 68px;
      border-radius: 6px;
    }

    .phrase-hanzi {
      font-size: 1.4rem;
    }

    .phrase-card.long .phrase-hanzi {
      font-size: 1rem;
    }

    .phrase-index { font-size: 0.55rem; }

    .speak-empty { padding: 3rem 1.5rem; }
    .speak-empty-char { font-size: 2.5rem; }
    .speak-empty p { font-size: 0.8rem; }

    .bundle-bar {
      padding: 0.6rem 0.75rem;
      flex-direction: column;
      align-items: stretch;
    }

    .bundle-bar select {
      max-width: none;
      font-size: 16px;
    }

    .bundle-actions { justify-content: flex-start; }
    .bundle-actions-io { margin-left: 0; }

    .flash-hanzi { font-size: 2.8rem; }
    .flash-card.long-phrase .flash-hanzi { font-size: 1.8rem; }
    .flash-card { min-height: 200px; padding: 2.5rem 1.5rem; }
    .flash-buttons {
      flex-direction: column;
      align-items: stretch;
      gap: 0.5rem;
    }
    .btn-flash {
      justify-content: center;
      width: 100%;
    }
    .flash-done { padding: 2rem 1.5rem; }
    .flash-done-title { font-size: 1.4rem; }
  }

  /* Very small phones */
  @media (max-width: 350px) {
    .phrase-grid {
      grid-template-columns: repeat(2, 1fr);
    }

    .phrase-hanzi { font-size: 1.3rem; }
    .phrase-card.long .phrase-hanzi { font-size: 0.95rem; }

    .speak-controls {
      flex-direction: column;
    }

    .speak-controls .btn-secondary {
      width: 100%;
    }
  }

  /* Safe area padding for notched phones */
  @supports (padding: env(safe-area-inset-bottom)) {
    main {
      padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
    }

    header {
      padding-left: calc(0.75rem + env(safe-area-inset-left));
      padding-right: calc(0.75rem + env(safe-area-inset-right));
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-char">说</span>
    <span class="logo-text">pronunciation practice</span>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="edit" onclick="switchMode('edit')">Edit</button>
    <button class="mode-btn" data-mode="speak" onclick="switchMode('speak')">Speak</button>
    <button class="mode-btn" data-mode="flash" onclick="switchMode('flash')">Flash</button>
  </div>
</header>

<div class="voice-bar">
  <div class="voice-row">
    <label>Voice</label>
    <select id="voiceSelect"><option>Loading voices…</option></select>
    <div class="voice-warning" id="voiceWarning">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      No Chinese voice found
    </div>
  </div>
  <div class="speed-control">
    <label>Speed</label>
    <input type="range" id="speedRange" min="0.3" max="1.5" step="0.1" value="0.8">
    <span class="speed-val" id="speedVal">0.8×</span>
  </div>
</div>

<div class="bundle-bar">
  <label>Bundle</label>
  <select id="bundleSelect"></select>
  <div class="bundle-actions">
    <button class="btn-icon" onclick="createBundle()" title="New bundle" aria-label="New bundle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="btn-icon" onclick="renameBundle()" title="Rename bundle" aria-label="Rename bundle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
    <button class="btn-icon danger" onclick="deleteBundle()" title="Delete bundle" aria-label="Delete bundle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </button>
  </div>
  <div class="bundle-actions-io">
    <button class="btn-icon" onclick="exportBundle()" title="Export bundle" aria-label="Export bundle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button class="btn-icon" onclick="document.getElementById('importFile').click()" title="Import bundle" aria-label="Import bundle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </button>
    <input type="file" id="importFile" accept=".txt,.csv" style="display:none" onchange="importBundle(event)">
  </div>
</div>

<main>
  <!-- Edit View -->
  <div class="edit-view active" id="editView">
    <div class="edit-header">
      <h2 class="edit-title">Add your phrases</h2>
      <span class="edit-hint">Separate with commas, newlines, or both</span>
    </div>
    <div class="textarea-wrap">
      <textarea id="phraseInput" placeholder="你好, 谢谢, 再见&#10;我是学生&#10;请问，这个多少钱？&#10;早上好, 晚安"></textarea>
    </div>
    <div class="edit-actions">
      <button class="btn-primary" onclick="applyPhrases()">Practice these →</button>
      <button class="btn-secondary" onclick="loadSample()">Load sample</button>
      <span class="phrase-count" id="phraseCount"></span>
    </div>
  </div>

  <!-- Speak View -->
  <div class="speak-view" id="speakView">
    <div class="speak-controls" id="speakControls" style="display:none;">
      <button class="btn-secondary" onclick="speakAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Play all
      </button>
      <button class="btn-secondary" onclick="shuffleCards()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        Shuffle
      </button>
      <button class="btn-secondary" onclick="switchMode('edit')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit
      </button>
    </div>
    <div class="phrase-grid" id="phraseGrid"></div>
    <div class="speak-empty" id="speakEmpty">
      <span class="speak-empty-char">空</span>
      <p>No phrases yet.<br>Switch to Edit mode to add some.</p>
    </div>
  </div>

  <!-- Flash View -->
  <div class="flash-view" id="flashView">
    <div class="flash-empty" id="flashEmpty">
      <span class="speak-empty-char">空</span>
      <p>No phrases yet.<br>Switch to Edit mode to add some.</p>
    </div>
    <div class="flash-session" id="flashSession" style="display:none;">
      <div class="flash-progress">
        <div class="flash-progress-bar" id="flashProgressBar"></div>
      </div>
      <div class="flash-counter" id="flashCounter"></div>
      <div class="flash-card" id="flashCard" onclick="flashSpeak()">
        <div class="flash-hanzi" id="flashHanzi"></div>
      </div>
      <div class="flash-buttons">
        <button class="btn-flash btn-flash-speak" onclick="flashSpeak()" aria-label="Speak">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
        <button class="btn-flash btn-flash-wrong" onclick="flashAnswer(false)" aria-label="Wrong">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <button class="btn-flash btn-flash-correct" onclick="flashAnswer(true)" aria-label="Correct">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      </div>
    </div>
    <div class="flash-done" id="flashDone" style="display:none;">
      <div class="flash-done-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <h2 class="flash-done-title">Well done!</h2>
      <div class="flash-done-stats" id="flashStats"></div>
      <div class="flash-done-actions">
        <button class="btn-primary" onclick="startFlashSession()">Practice again</button>
        <button class="btn-secondary" onclick="switchMode('speak')">Back to grid</button>
      </div>
    </div>
  </div>
</main>

<script>
  // ── State ──
  let phrases = [];
  let chineseVoices = [];
  let selectedVoice = null;
  let isSpeakingAll = false;
  let speakAllCancel = false;
  let currentMode = 'edit';

  // Flash mode state
  let flashDeck = [];
  let flashIndex = 0;
  let flashTotal = 0;
  let flashCorrect = 0;
  let flashWrong = 0;
  let flashSeen = new Set();

  // ── Storage ──
  const STORAGE_KEY = 'shuo_data';

  function generateId() {
    return Math.random().toString(36).substring(2, 10);
  }

  function getDefaultStore() {
    return {
      version: 1,
      activeBundleId: 'default',
      bundles: [{ id: 'default', name: 'My Phrases', phrases: [] }],
      settings: { speed: 0.8 },
    };
  }

  function loadStore() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return getDefaultStore();
      const data = JSON.parse(raw);
      if (!data.version || !Array.isArray(data.bundles) || data.bundles.length === 0) {
        return getDefaultStore();
      }
      return data;
    } catch (e) {
      return getDefaultStore();
    }
  }

  function saveStore(s) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
    } catch (e) {
      // quota exceeded — silently fail
    }
  }

  function getActiveBundle(s) {
    return s.bundles.find((b) => b.id === s.activeBundleId) || s.bundles[0];
  }

  let store = loadStore();

  // ── Voice setup ──
  const synth = window.speechSynthesis;

  function loadVoices() {
    const allVoices = synth.getVoices();
    chineseVoices = allVoices.filter(
      (v) => v.lang.startsWith('zh') || v.lang.startsWith('cmn'),
    );

    const select = document.getElementById('voiceSelect');
    const warning = document.getElementById('voiceWarning');
    select.innerHTML = '';

    if (chineseVoices.length === 0) {
      select.innerHTML = '<option>No Chinese voice available</option>';
      warning.classList.add('show');
      selectedVoice = null;
      return;
    }

    warning.classList.remove('show');

    chineseVoices.sort((a, b) => {
      const aScore = a.lang.includes('CN') ? 0 : 1;
      const bScore = b.lang.includes('CN') ? 0 : 1;
      return aScore - bScore;
    });

    chineseVoices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      select.appendChild(opt);
    });

    selectedVoice = chineseVoices[0];
  }

  synth.addEventListener('voiceschanged', loadVoices);
  loadVoices();

  document.getElementById('voiceSelect').addEventListener('change', (e) => {
    selectedVoice = chineseVoices[e.target.value] || null;
  });

  // ── Speed ──
  const speedRange = document.getElementById('speedRange');
  const speedVal = document.getElementById('speedVal');
  speedRange.addEventListener('input', () => {
    speedVal.textContent = parseFloat(speedRange.value).toFixed(1) + '×';
    store.settings.speed = parseFloat(speedRange.value);
    saveStore(store);
  });

  // ── Mode switching ──
  function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach((b) =>
      b.classList.toggle('active', b.dataset.mode === mode),
    );
    document.getElementById('editView').classList.toggle('active', mode === 'edit');
    document.getElementById('speakView').classList.toggle('active', mode === 'speak');
    document.getElementById('flashView').classList.toggle('active', mode === 'flash');

    if (mode === 'speak') renderGrid();
    if (mode === 'flash') {
      if (phrases.length === 0) {
        document.getElementById('flashEmpty').style.display = '';
        document.getElementById('flashSession').style.display = 'none';
        document.getElementById('flashDone').style.display = 'none';
      } else {
        startFlashSession();
      }
    }
    if (mode === 'edit') {
      synth.cancel();
      isSpeakingAll = false;
    }
  }

  // ── Phrase parsing ──
  function parsePhrases(text) {
    return text
      .split(/[,，\s]+/)
      .map((s) => s.trim())
      .filter((s) => s.length > 0);
  }

  function updateCount() {
    const input = document.getElementById('phraseInput').value;
    const parsed = parsePhrases(input);
    const el = document.getElementById('phraseCount');
    el.textContent =
      parsed.length > 0 ? `${parsed.length} phrase${parsed.length !== 1 ? 's' : ''}` : '';
  }

  let saveTimeout = null;
  document.getElementById('phraseInput').addEventListener('input', () => {
    updateCount();
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
      const parsed = parsePhrases(document.getElementById('phraseInput').value);
      phrases = parsed;
      const bundle = getActiveBundle(store);
      bundle.phrases = parsed;
      saveStore(store);
    }, 300);
  });

  function applyPhrases() {
    const input = document.getElementById('phraseInput').value;
    phrases = parsePhrases(input);
    const bundle = getActiveBundle(store);
    bundle.phrases = phrases;
    saveStore(store);
    switchMode('speak');
  }

  // ── Sample data ──
  function loadSample() {
    const sample = [
      '你好', '谢谢', '再见', '对不起', '没关系',
      '请问', '多少钱', '太贵了', '便宜一点',
      '我不懂', '你会说英语吗', '在哪里',
      '早上好', '晚安', '吃饭了吗',
      '好的', '不要', '可以', '一二三',
      '学中文', '加油', '慢慢来', '听不懂',
    ];
    document.getElementById('phraseInput').value = sample.join(' ');
    phrases = sample;
    const bundle = getActiveBundle(store);
    bundle.phrases = sample;
    saveStore(store);
    updateCount();
  }

  // ── Bundles ──
  function renderBundleSelect() {
    const select = document.getElementById('bundleSelect');
    select.innerHTML = '';
    store.bundles.forEach((b) => {
      const opt = document.createElement('option');
      opt.value = b.id;
      opt.textContent = b.name;
      if (b.id === store.activeBundleId) opt.selected = true;
      select.appendChild(opt);
    });
  }

  document.getElementById('bundleSelect').addEventListener('change', (e) => {
    switchBundle(e.target.value);
  });

  function switchBundle(bundleId) {
    store.activeBundleId = bundleId;
    saveStore(store);
    const bundle = getActiveBundle(store);
    phrases = [...bundle.phrases];
    document.getElementById('phraseInput').value = phrases.join(' ');
    updateCount();
    switchMode(phrases.length > 0 ? 'speak' : 'edit');
  }

  function createBundle() {
    const name = prompt('Bundle name:');
    if (!name || !name.trim()) return;
    const id = generateId();
    store.bundles.push({ id, name: name.trim(), phrases: [] });
    store.activeBundleId = id;
    saveStore(store);
    phrases = [];
    document.getElementById('phraseInput').value = '';
    updateCount();
    renderBundleSelect();
    switchMode('edit');
  }

  function renameBundle() {
    const bundle = getActiveBundle(store);
    const name = prompt('Rename bundle:', bundle.name);
    if (!name || !name.trim()) return;
    bundle.name = name.trim();
    saveStore(store);
    renderBundleSelect();
  }

  function deleteBundle() {
    if (store.bundles.length <= 1) {
      alert('Cannot delete the only bundle.');
      return;
    }
    const bundle = getActiveBundle(store);
    if (!confirm(`Delete "${bundle.name}"?`)) return;
    store.bundles = store.bundles.filter((b) => b.id !== bundle.id);
    store.activeBundleId = store.bundles[0].id;
    saveStore(store);
    const active = getActiveBundle(store);
    phrases = [...active.phrases];
    document.getElementById('phraseInput').value = phrases.join(' ');
    updateCount();
    renderBundleSelect();
    switchMode(phrases.length > 0 ? 'speak' : 'edit');
  }

  // ── Import / Export ──
  function sanitizeFilename(name) {
    return name.replace(/[^\w一-鿿㐀-䶿 -]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '') || 'bundle';
  }

  function exportBundle() {
    const bundle = getActiveBundle(store);
    if (bundle.phrases.length === 0) {
      alert('This bundle has no phrases to export.');
      return;
    }
    const text = bundle.phrases.join(' ');
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = sanitizeFilename(bundle.name) + '.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importBundle(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      const text = e.target.result;
      const imported = text
        .split(/[\n\r]+/)
        .map((s) => s.trim())
        .filter((s) => s.length > 0);

      if (imported.length === 0) {
        alert('No phrases found in file.');
        return;
      }

      const name = file.name.replace(/\.[^.]+$/, '') || 'Imported';
      const id = generateId();
      store.bundles.push({ id, name, phrases: imported });
      store.activeBundleId = id;
      saveStore(store);

      phrases = imported;
      document.getElementById('phraseInput').value = imported.join(' ');
      updateCount();
      renderBundleSelect();
      switchMode('speak');
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  // ── Grid rendering ──
  function renderGrid() {
    const grid = document.getElementById('phraseGrid');
    const empty = document.getElementById('speakEmpty');
    const controls = document.getElementById('speakControls');

    grid.innerHTML = '';

    if (phrases.length === 0) {
      empty.style.display = '';
      controls.style.display = 'none';
      return;
    }

    empty.style.display = 'none';
    controls.style.display = 'flex';

    phrases.forEach((phrase, i) => {
      const card = document.createElement('div');
      card.className = 'phrase-card' + (phrase.length > 4 ? ' long' : '');
      card.style.animation = `cardIn 0.3s ease ${i * 0.03}s both`;
      card.innerHTML = `
        <span class="sound-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </span>
        <span class="phrase-index">${i + 1}</span>
        <div class="phrase-hanzi">${escapeHtml(phrase)}</div>
      `;
      card.addEventListener('click', () => speakPhrase(phrase, card));
      grid.appendChild(card);
    });
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ── TTS ──
  function speakPhrase(text, cardEl) {
    synth.cancel();

    const utter = new SpeechSynthesisUtterance(text);
    if (selectedVoice) utter.voice = selectedVoice;
    utter.lang = selectedVoice ? selectedVoice.lang : 'zh-CN';
    utter.rate = parseFloat(speedRange.value);

    document.querySelectorAll('.speaking').forEach((c) => c.classList.remove('speaking'));
    if (cardEl) cardEl.classList.add('speaking');

    utter.onend = () => {
      if (cardEl) cardEl.classList.remove('speaking');
    };
    utter.onerror = () => {
      if (cardEl) cardEl.classList.remove('speaking');
    };

    synth.speak(utter);
  }

  // ── Play all ──
  async function speakAll() {
    if (isSpeakingAll) {
      speakAllCancel = true;
      synth.cancel();
      isSpeakingAll = false;
      return;
    }

    isSpeakingAll = true;
    speakAllCancel = false;
    const cards = document.querySelectorAll('.phrase-card');

    for (let i = 0; i < phrases.length; i++) {
      if (speakAllCancel) break;

      await new Promise((resolve) => {
        const utter = new SpeechSynthesisUtterance(phrases[i]);
        if (selectedVoice) utter.voice = selectedVoice;
        utter.lang = selectedVoice ? selectedVoice.lang : 'zh-CN';
        utter.rate = parseFloat(speedRange.value);

        document.querySelectorAll('.phrase-card.speaking').forEach((c) =>
          c.classList.remove('speaking'),
        );
        cards[i]?.classList.add('speaking');

        utter.onend = () => {
          cards[i]?.classList.remove('speaking');
          setTimeout(resolve, 350);
        };
        utter.onerror = () => {
          cards[i]?.classList.remove('speaking');
          resolve();
        };

        synth.speak(utter);
      });
    }

    isSpeakingAll = false;
    document.querySelectorAll('.phrase-card.speaking').forEach((c) =>
      c.classList.remove('speaking'),
    );
  }

  // ── Shuffle utility ──
  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function shuffleCards() {
    synth.cancel();
    isSpeakingAll = false;
    shuffleArray(phrases);
    renderGrid();
  }

  // ── Flash Mode ──
  function startFlashSession() {
    flashDeck = [...phrases];
    shuffleArray(flashDeck);
    flashIndex = 0;
    flashTotal = flashDeck.length;
    flashCorrect = 0;
    flashWrong = 0;
    flashSeen = new Set();

    document.getElementById('flashEmpty').style.display = 'none';
    document.getElementById('flashSession').style.display = '';
    document.getElementById('flashDone').style.display = 'none';

    showFlashCard();
  }

  function showFlashCard() {
    if (flashDeck.length === 0) {
      endFlashSession();
      return;
    }

    if (flashIndex >= flashDeck.length) flashIndex = 0;

    const phrase = flashDeck[flashIndex];
    const card = document.getElementById('flashCard');
    const hanzi = document.getElementById('flashHanzi');

    hanzi.textContent = phrase;
    card.className = 'flash-card' + (phrase.length > 4 ? ' long-phrase' : '') + ' slide-in';

    const completed = flashTotal - flashDeck.length;
    const pct = flashTotal > 0 ? Math.round((completed / flashTotal) * 100) : 0;
    document.getElementById('flashProgressBar').style.width = pct + '%';
    document.getElementById('flashCounter').textContent =
      `${completed} of ${flashTotal} done · ${flashDeck.length} remaining`;
  }

  function flashAnswer(correct) {
    synth.cancel();
    const phrase = flashDeck[flashIndex];
    const card = document.getElementById('flashCard');

    if (!flashSeen.has(phrase)) {
      flashSeen.add(phrase);
      if (correct) flashCorrect++;
      else flashWrong++;
    }

    if (correct) {
      flashDeck.splice(flashIndex, 1);
      if (flashDeck.length > 0 && flashIndex >= flashDeck.length) {
        flashIndex = 0;
      }
    } else {
      const current = flashDeck.splice(flashIndex, 1)[0];
      const remaining = flashDeck.length - flashIndex;
      const offset = Math.floor(Math.random() * Math.max(1, remaining)) + 1;
      const insertAt = Math.min(flashIndex + offset, flashDeck.length);
      flashDeck.splice(insertAt, 0, current);
      if (flashIndex >= flashDeck.length) flashIndex = 0;
    }

    card.classList.add('slide-out');
    setTimeout(() => showFlashCard(), 200);
  }

  function flashSpeak() {
    if (flashDeck.length > 0 && flashIndex < flashDeck.length) {
      const card = document.getElementById('flashCard');
      speakPhrase(flashDeck[flashIndex], card);
    }
  }

  function endFlashSession() {
    document.getElementById('flashSession').style.display = 'none';
    document.getElementById('flashDone').style.display = '';

    const pct = flashTotal > 0 ? Math.round((flashCorrect / flashTotal) * 100) : 0;
    document.getElementById('flashStats').innerHTML =
      `${flashTotal} phrases practiced<br>` +
      `${flashCorrect} correct on first try (${pct}%)<br>` +
      `${flashWrong} needed review`;

    document.getElementById('flashProgressBar').style.width = '100%';
  }

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', (e) => {
    if (currentMode !== 'flash') return;
    if (document.getElementById('flashSession').style.display === 'none') return;

    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      flashSpeak();
    } else if (e.key === 'ArrowLeft' || e.key === '1') {
      e.preventDefault();
      flashAnswer(false);
    } else if (e.key === 'ArrowRight' || e.key === '2') {
      e.preventDefault();
      flashAnswer(true);
    }
  });

  // ── Init ──
  (function init() {
    const bundle = getActiveBundle(store);
    phrases = [...bundle.phrases];
    document.getElementById('phraseInput').value = phrases.join(' ');

    speedRange.value = store.settings.speed;
    speedVal.textContent = parseFloat(store.settings.speed).toFixed(1) + '×';

    renderBundleSelect();
    updateCount();
    if (phrases.length > 0) switchMode('speak');
  })();
</script>

</body>
